# Enable pointing/mouse so the Mouse layer (&mmv/&msc/&mkp) works.
CONFIG_ZMK_POINTING=y

# NOTE: do NOT set CONFIG_ZMK_STUDIO here. The build workflow enables ZMK
# Studio only for the Clique variant, via the `studio-rpc-usb-uart`
# snippet that supplies the zmk,studio-rpc-uart chosen node. Forcing it on
# globally breaks the Legacy (no-clique) build, which has no such node.
# `&studio_unlock` in the Sys layer compiles fine either way.
