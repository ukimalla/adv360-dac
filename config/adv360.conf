# zdac port. No pointing needed (zdac's Mouse layer is empty).
# ZMK Studio (live keymap editing over USB, no reflashing) is enabled at
# build time via the `studio-rpc-usb-uart` snippet on the left/central half
# (see build.sh / build.yml), exactly as the Adv360 Clique build does.

# 1000 Hz USB polling on the wired (left/central) half, matching zdac.
CONFIG_USB_HID_POLL_INTERVAL_MS=1
